playwright:
  enabled: false
  headless: true
  timeout_seconds: 30

crawler:
  default_rate_limit_seconds: 3
  request_timeout_seconds: 30
  max_retries: 2
  max_concurrent_sites: 8
  max_concurrent_playwright_sites: 1
  db_busy_timeout_seconds: 30
  db_write_retries: 8
  db_write_retry_delay_seconds: 0.25
  article_date_lookup_enabled: true
  article_date_lookup_max_per_site: 30
  article_date_lookup_rate_limit_seconds: 1.0
  structure_check_enabled: true
  structure_check_interval_hours: 24
  structure_check_keyword: "トヨタ"
  structure_check_min_results: 5
  structure_check_min_baseline_checks: 3
  structure_check_result_count_drop_ratio: 0.5
  structure_check_title_match_rate_drop_points: 0.3
  structure_check_title_match_warning_rate: 0.2

report:
  output_dir: reports
