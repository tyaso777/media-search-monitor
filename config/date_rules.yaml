  - site_id: shimotsuke
    date_rule: current_day_or_current_year_if_yearless
    rationale: "Live search result checks on 2026-06-21 showed time-only entries such as 5:00 matching same-day article datePublished, yearless M/D entries for current-year pages, and older pages displaying explicit years such as 2025/9/26 and 2007/9/21."
