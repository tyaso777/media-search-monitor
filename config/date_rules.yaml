rules:
  - site_id: asahi
    date_rule: none
    rationale: "Search results verified with Playwright do not expose a reliable published date."
  - site_id: yomiuri
    date_rule: machine_datetime
    rationale: "Uses time[datetime] with an ISO-like year-qualified value."
  - site_id: mainichi
    date_rule: explicit_year_only
    rationale: "Search result date text includes year, for example 2026/6/18."
  - site_id: sankei
    date_rule: none
    rationale: "Search result cards do not expose a reliable published date."
  - site_id: nikkei
    date_rule: machine_datetime
    rationale: "Uses time[datetime] with a year-qualified value."
  - site_id: tokyo_np
    date_rule: relative_japanese_or_explicit_year
    rationale: "Correct search endpoint is /search_result?q=. If the result page exposes 3時間前/2日前/yyyy/mm/dd text it is normalized; otherwise article JSON-LD fallback supplies an explicit timestamp."
  - site_id: chunichi
    date_rule: relative_japanese_or_explicit_year
    rationale: "Correct search endpoint is /search_result?q=. Google CSE snippets expose relative dates such as 3日前 and explicit dates such as 2026/06/11."
  - site_id: hokkaido_np
    date_rule: explicit_year_only
    rationale: "Search result date text includes year, for example 2026年6月18日."
  - site_id: kahoku
    date_rule: url_date_or_explicit_year
    rationale: "Search results may omit year, but article URLs contain yyyyMMdd; URL date is safer than current-year inference."
  - site_id: toonippo
    date_rule: current_day_if_time_only
    rationale: "Live search result check on 2026-06-21 showed time-only entries such as 14:33更新 matching article page datePublished on the same day; yearless M/D remains unaccepted."
