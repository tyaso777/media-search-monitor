overrides:
  - site_id: asahi
    requires_playwright: true
    result_item_selector: "#SiteSearchResult li.digital, #SiteSearchResult li.shimbun"
    title_selector: "a[href*='/articles/']"
    url_selector: "a[href*='/articles/']"
    date_selector: null
    snippet_selector: "p"
    url_include_patterns: ["/articles/"]
    notes: "Separate public site-search host; rendered result list verified with Playwright."

  - site_id: mainichi
    result_item_selector: "#searchresults-list .articlelist > li"
    title_selector: ".articlelist-title"
    url_selector: "a"
    date_selector: ".articletag-date"
    snippet_selector: ".text-ellipsis-2"
    url_include_patterns: ["/articles/"]
    notes: "Public search page; selectors verified against pilot static HTML."

  - site_id: yomiuri
