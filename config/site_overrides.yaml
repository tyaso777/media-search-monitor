    snippet_selector: null
    url_include_patterns: ["/economy/", "/local/", "/culture/", "/sports/", "/national/", "/politics/", "/world/", "/science/", "/medical/", "/editorial/", "/english/"]
    notes: "Public form-confirmed search endpoint; selectors verified against pilot static HTML."

