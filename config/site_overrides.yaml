    fetch_strategy: google_cse
    result_item_selector: ".gsc-webResult.gsc-result"
    title_selector: "a.gs-title[href]"
    url_selector: "a.gs-title[href]"
    date_selector: ".gs-snippet"
    snippet_selector: ".gs-snippet"
    url_include_patterns: ["/article/"]
    date_strategy: css_selector
    google_cse_lightweight_candidate: true
    google_cse_cx: "ec5a58b709f62d071"
    google_cse_sort: "date"
    google_cse_notes: "Uses cse.js to retrieve the short-lived cse_token, then calls the element/v1 JSONP endpoint directly."
    notes: "Correct search endpoint is /search_result?q=. Results are fetched through the Google CSE element endpoint and converted to CSE result HTML."

