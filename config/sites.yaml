sites:
  - site_id: sample_news
    site_name: Sample News
    enabled: false
    search_url_template: "https://example.com/search?q={query}"
    query_encoding: "utf-8"
    requires_playwright: false
    result_item_selector: ".search-result"
    title_selector: ".title"
    url_selector: "a"
    date_selector: ".date"
    snippet_selector: ".snippet"
    rate_limit_seconds: 3
    user_agent: "news-monitor-bot/0.1"
    max_pages: 1
    next_page_selector: null
    notes: "Example static search page"

  - site_id: sample_dynamic_news
    site_name: Sample Dynamic News
    enabled: false
    search_url_template: "https://dynamic.example.com/search?q={query}"
    query_encoding: "utf-8"
    requires_playwright: true
    result_item_selector: ".result"
    title_selector: ".result-title"
    url_selector: "a"
    date_selector: ".published-date"
    snippet_selector: ".summary"
    rate_limit_seconds: 5
    user_agent: "news-monitor-bot/0.1"
    max_pages: 1
    next_page_selector: null
    notes: "Skipped when Playwright is disabled"

  - site_id: asahi
    site_name: 朝日新聞デジタル
    enabled: false
    search_url_template: "https://sitesearch.asahi.com/sitesearch/?Keywords={query}&Searchsubmit=%E6%A4%9C%E7%B4%A2&iref=pc_gnavi"
    query_encoding: "utf-8"
    requires_playwright: true
    result_item_selector: "article, .SearchResult, .search-result, .List li"
    title_selector: "h2 a, h3 a, .title a, a"
    url_selector: "h2 a, h3 a, .title a, a"
    date_selector: "time, .date, .Date"
    snippet_selector: "p, .summary, .lead"
    rate_limit_seconds: 3
    user_agent: "news-monitor-bot/0.1"
    max_pages: 1
    next_page_selector: null
    notes: "Separate public site-search host; static HTML did not include rendered results in pilot, so Playwright is required."

